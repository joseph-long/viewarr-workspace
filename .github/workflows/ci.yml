name: CI

on:
  push:
    branches: 'main'
  pull_request:
    branches: '*'
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Build the shared viewarr WASM package ONCE; every downstream job consumes it.
  # ---------------------------------------------------------------------------
  build-viewarr:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'

      - name: Install Rust and wasm-pack
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source ~/.cargo/env
          cargo install wasm-pack

      - name: Build viewarr
        working-directory: viewarr
        run: |
          source ~/.cargo/env
          npm install
          npm run build

      - name: Upload viewarr pkg
        uses: actions/upload-artifact@v7
        with:
          name: viewarr-pkg
          path: viewarr/pkg
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # jupyterlab-fitsview (PyPI: fitsview)
  # ---------------------------------------------------------------------------
  fitsview:
    needs: build-viewarr
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: jupyterlab-fitsview
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # need tags for hatch-vcs (version from git tag)

      # Pin the version from the release tag BEFORE any build step. The build
      # (e.g. jlpm install rewriting yarn.lock) dirties the tree, which
      # setuptools_scm would otherwise read as "one commit past the tag" and
      # bump to <next>.dev0 -- diverging from pyviewarr. This keeps both packages
      # locked to the exact tag version.
      - name: Pin version from release tag
        if: github.event_name == 'release'
        run: echo "SETUPTOOLS_SCM_PRETEND_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Download viewarr pkg
        uses: actions/download-artifact@v8
        with:
          name: viewarr-pkg
          path: viewarr/pkg

      - name: Base Setup
        uses: jupyterlab/maintainer-tools/.github/actions/base-setup@v1

      - name: Install dependencies
        run: python -m pip install -U "jupyterlab>=4.0.0,<5"

      - name: Install JS dependencies
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: 0
        run: jlpm install

      - name: Lint the extension
        run: |
          set -eux
          jlpm run lint:check

      - name: Test the extension
        run: |
          set -eux
          jlpm run test

      - name: Run Python tests
        run: |
          set -eux
          python -m pip install .[test]
          python -m pytest fitsview/tests -v --cov=fitsview --cov-report=term-missing

      - name: Build the extension
        run: |
          set -eux
          python -m pip install .
          jupyter labextension list
          jupyter labextension list 2>&1 | grep -ie "fitsview.*OK"

      - name: Package the extension
        run: |
          set -eux
          pip install build
          python -m build

      - name: Upload extension packages
        uses: actions/upload-artifact@v7
        with:
          name: fitsview-dist
          path: jupyterlab-fitsview/dist/*
          if-no-files-found: error

  fitsview-isolated:
    needs: fitsview
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          architecture: 'x64'
      - uses: actions/download-artifact@v8
        with:
          name: fitsview-dist
      - name: Install and Test
        run: |
          set -eux
          pip install "jupyterlab>=4.0.0,<5" fitsview*.whl
          jupyter labextension list
          jupyter labextension list 2>&1 | grep -ie "fitsview.*OK"
          python -m jupyterlab.browser_check --no-browser-test

  fitsview-integration:
    name: fitsview integration tests
    needs: fitsview
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Run inside the official Playwright image: Chromium + the matching system
    # libraries are preinstalled, so there is no browser download to stall on.
    # The image tag MUST stay in sync with PLAYWRIGHT_VERSION below and with the
    # pinned @playwright/test in ui-tests/package.json. The "Verify Playwright"
    # step fails the job if they drift (which would otherwise trigger a download).
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-noble
    env:
      PLAYWRIGHT_VERSION: "1.61.0"
    defaults:
      run:
        working-directory: jupyterlab-fitsview
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Download extension package
        uses: actions/download-artifact@v8
        with:
          name: fitsview-dist
          path: jupyterlab-fitsview/dist

      - name: Install the extension (provides jlpm + jupyterlab)
        run: |
          set -eux
          python -m pip install "jupyterlab>=4.0.0,<5" dist/fitsview*.whl

      - name: Install ui-tests dependencies
        working-directory: jupyterlab-fitsview/ui-tests
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: 0
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
        run: jlpm install

      - name: Verify Playwright browsers are preinstalled (fail instead of downloading)
        working-directory: jupyterlab-fitsview/ui-tests
        run: |
          set -eu
          echo "Image Playwright (PLAYWRIGHT_VERSION): ${PLAYWRIGHT_VERSION}"
          INSTALLED="$(jlpm playwright --version | awk '{print $NF}')"
          echo "Resolved @playwright/test:             ${INSTALLED}"
          if [ "${INSTALLED}" != "${PLAYWRIGHT_VERSION}" ]; then
            echo "::error::Playwright version drift: project resolves ${INSTALLED} but this job runs in the v${PLAYWRIGHT_VERSION} image, so browsers would be re-downloaded. Bump the container image tag, the PLAYWRIGHT_VERSION env, and the pinned @playwright/test (+ yarn.lock) together."
            exit 1
          fi
          LOC="$(jlpm playwright install chromium --dry-run 2>&1 | grep -iEo '/[^[:space:]]*ms-playwright[^[:space:]]*' | head -n1 || true)"
          if [ -n "${LOC}" ] && [ ! -e "${LOC}" ]; then
            echo "::error::Chromium for Playwright ${INSTALLED} is not present at ${LOC}; a download would be triggered (image/version drift)."
            exit 1
          fi
          echo "OK: Playwright ${INSTALLED} matches the image; no browser download needed."

      - name: Execute integration tests
        working-directory: jupyterlab-fitsview/ui-tests
        run: jlpm playwright test

      - name: Upload Playwright Test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fitsview-playwright-tests
          path: |
            jupyterlab-fitsview/ui-tests/test-results
            jupyterlab-fitsview/ui-tests/playwright-report

  # ---------------------------------------------------------------------------
  # pyviewarr (PyPI: pyviewarr)
  # ---------------------------------------------------------------------------
  pyviewarr:
    needs: build-viewarr
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Run inside the official Playwright image (browsers + system libs
    # preinstalled). Keep the tag in sync with PLAYWRIGHT_VERSION and the pinned
    # @playwright/test in package.json; the "Verify Playwright" step enforces it.
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-noble
    env:
      PLAYWRIGHT_VERSION: "1.61.0"
    defaults:
      run:
        working-directory: pyviewarr
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # need tags for hatch-vcs (version from git tag)

      # The container runs as root while the checkout is owned by another uid;
      # without this, setuptools_scm's `git describe` fails with "dubious
      # ownership" and the version can't be resolved.
      - name: Mark workspace safe for git
        run: git config --global --add safe.directory '*'

      # See the matching step in the fitsview job: pin the version from the
      # release tag so a build-dirtied tree can't bump it to <next>.dev0.
      - name: Pin version from release tag
        if: github.event_name == 'release'
        run: echo "SETUPTOOLS_SCM_PRETEND_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Download viewarr pkg
        uses: actions/download-artifact@v8
        with:
          name: viewarr-pkg
          path: viewarr/pkg

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install JavaScript dependencies
        run: npm install

      # Build the widget from the shared viewarr pkg before the Python install.
      # The editable install runs the hatch-jupyter-builder hook regardless of
      # skip-if-exists, which is why build_cmd is `build` (bundle), not `build:all`
      # (recompile WASM with wasm-pack, absent here) -- see pyproject.toml.
      - name: Build widget (uses shared viewarr pkg)
        run: npm run build

      - name: Install Python dependencies
        run: |
          # Use `python -m pip` throughout: in the Playwright container the
          # setup-python interpreter is on PATH but a bare `pip` shim is not.
          python -m pip install --upgrade pip
          python -m pip install build
          python -m pip install -e ".[dev]"

      - name: Verify Playwright browsers are preinstalled (fail instead of downloading)
        run: |
          set -eu
          echo "Image Playwright (PLAYWRIGHT_VERSION): ${PLAYWRIGHT_VERSION}"
          INSTALLED="$(npx playwright --version | awk '{print $NF}')"
          echo "Resolved @playwright/test:             ${INSTALLED}"
          if [ "${INSTALLED}" != "${PLAYWRIGHT_VERSION}" ]; then
            echo "::error::Playwright version drift: project resolves ${INSTALLED} but this job runs in the v${PLAYWRIGHT_VERSION} image, so browsers would be re-downloaded. Bump the container image tag, the PLAYWRIGHT_VERSION env, and the pinned @playwright/test (+ package-lock.json) together."
            exit 1
          fi
          LOC="$(npx playwright install chromium --dry-run 2>&1 | grep -iEo '/[^[:space:]]*ms-playwright[^[:space:]]*' | head -n1 || true)"
          if [ -n "${LOC}" ] && [ ! -e "${LOC}" ]; then
            echo "::error::Chromium for Playwright ${INSTALLED} is not present at ${LOC}; a download would be triggered (image/version drift)."
            exit 1
          fi
          echo "OK: Playwright ${INSTALLED} matches the image; no browser download needed."

      - name: Run Playwright E2E tests
        run: npx playwright test

      - name: Build package
        run: python -m build

      - name: Verify package contents
        run: |
          set -eu
          # viewarr WASM is present (via the shared pkg)
          test -e viewarr/pkg/viewarr_bg.wasm
          # built sdist + wheel contain the bundled widget assets
          tar -tf dist/*.tar.gz | grep -E "(widget\.js|widget\.css)"
          python -c "import glob,zipfile; w=glob.glob('dist/*.whl')[0]; names=zipfile.ZipFile(w).namelist(); assert any(n.endswith('widget.js') for n in names), names"

      - uses: actions/upload-artifact@v7
        with:
          name: pyviewarr-dist
          path: pyviewarr/dist/*
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Publish BOTH packages to PyPI on a published GitHub release.
  # One release ships the freshly built viewarr into both packages.
  # ---------------------------------------------------------------------------
  publish-fitsview:
    needs: [fitsview-isolated, fitsview-integration]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    permissions:
      id-token: write
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: fitsview-dist
          path: dist
      - run: ls -R dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  publish-pyviewarr:
    needs: [pyviewarr]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    permissions:
      id-token: write
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: pyviewarr-dist
          path: dist
      - run: ls -R dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
