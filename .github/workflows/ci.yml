name: CI

on:
  push:
    branches: 'main'
  pull_request:
    branches: '*'
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Build the shared viewarr WASM package ONCE; every downstream job consumes it.
  # ---------------------------------------------------------------------------
  build-viewarr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Rust and wasm-pack
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source ~/.cargo/env
          cargo install wasm-pack

      - name: Build viewarr
        working-directory: viewarr
        run: |
          source ~/.cargo/env
          npm install
          npm run build

      - name: Upload viewarr pkg
        uses: actions/upload-artifact@v4
        with:
          name: viewarr-pkg
          path: viewarr/pkg
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # jupyterlab-fitsview (PyPI: fitsview)
  # ---------------------------------------------------------------------------
  fitsview:
    needs: build-viewarr
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jupyterlab-fitsview
    steps:
      - uses: actions/checkout@v4

      - name: Download viewarr pkg
        uses: actions/download-artifact@v4
        with:
          name: viewarr-pkg
          path: viewarr/pkg

      - name: Base Setup
        uses: jupyterlab/maintainer-tools/.github/actions/base-setup@v1

      - name: Install dependencies
        run: python -m pip install -U "jupyterlab>=4.0.0,<5"

      - name: Install JS dependencies
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: 0
        run: jlpm install

      - name: Lint the extension
        run: |
          set -eux
          jlpm run lint:check

      - name: Test the extension
        run: |
          set -eux
          jlpm run test

      - name: Run Python tests
        run: |
          set -eux
          python -m pip install .[test]
          python -m pytest fitsview/tests -v --cov=fitsview --cov-report=term-missing

      - name: Build the extension
        run: |
          set -eux
          python -m pip install .
          jupyter labextension list
          jupyter labextension list 2>&1 | grep -ie "fitsview.*OK"

      - name: Package the extension
        run: |
          set -eux
          pip install build
          python -m build

      - name: Upload extension packages
        uses: actions/upload-artifact@v4
        with:
          name: fitsview-dist
          path: jupyterlab-fitsview/dist/*
          if-no-files-found: error

  fitsview-isolated:
    needs: fitsview
    runs-on: ubuntu-latest
    steps:
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'
      - uses: actions/download-artifact@v4
        with:
          name: fitsview-dist
      - name: Install and Test
        run: |
          set -eux
          pip install "jupyterlab>=4.0.0,<5" fitsview*.whl
          jupyter labextension list
          jupyter labextension list 2>&1 | grep -ie "fitsview.*OK"
          python -m jupyterlab.browser_check --no-browser-test

  fitsview-integration:
    name: fitsview integration tests
    needs: fitsview
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers
    defaults:
      run:
        working-directory: jupyterlab-fitsview
    steps:
      - uses: actions/checkout@v4

      - name: Base Setup
        uses: jupyterlab/maintainer-tools/.github/actions/base-setup@v1

      - name: Download extension package
        uses: actions/download-artifact@v4
        with:
          name: fitsview-dist
          path: jupyterlab-fitsview/dist

      - name: Install the extension
        run: |
          set -eux
          python -m pip install "jupyterlab>=4.0.0,<5" dist/fitsview*.whl

      - name: Install dependencies
        working-directory: jupyterlab-fitsview/ui-tests
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: 0
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
        run: jlpm install

      - name: Set up browser cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/pw-browsers
          key: ${{ runner.os }}-${{ hashFiles('jupyterlab-fitsview/ui-tests/yarn.lock') }}

      - name: Install browser
        working-directory: jupyterlab-fitsview/ui-tests
        run: |
          set -eux
          jlpm playwright install-deps
          jlpm playwright install chromium

      - name: Execute integration tests
        working-directory: jupyterlab-fitsview/ui-tests
        run: jlpm playwright test

      - name: Upload Playwright Test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fitsview-playwright-tests
          path: |
            jupyterlab-fitsview/ui-tests/test-results
            jupyterlab-fitsview/ui-tests/playwright-report

  # ---------------------------------------------------------------------------
  # pyviewarr (PyPI: pyviewarr)
  # ---------------------------------------------------------------------------
  pyviewarr:
    needs: build-viewarr
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pyviewarr
    steps:
      - uses: actions/checkout@v4

      - name: Download viewarr pkg
        uses: actions/download-artifact@v4
        with:
          name: viewarr-pkg
          path: viewarr/pkg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
          pip install -e ".[dev]"

      - name: Install JavaScript dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build widget (uses shared viewarr pkg)
        run: npm run build

      - name: Run Playwright E2E tests
        run: npx playwright test

      - name: Build package
        run: python -m build

      - name: Verify package contents
        run: |
          # viewarr WASM is present (via the shared pkg)
          if [[ ! -e viewarr/pkg/viewarr_bg.wasm ]]; then exit 1; fi
          # built package contains the expected files
          tar -tf dist/*.tar.gz | grep -E "(widget\.js|widget\.css)" || exit 1
          unzip -l dist/*.whl | grep widget.js || exit 1

      - uses: actions/upload-artifact@v4
        with:
          name: pyviewarr-dist
          path: pyviewarr/dist/*
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Publish BOTH packages to PyPI on a published GitHub release.
  # One release ships the freshly built viewarr into both packages.
  # ---------------------------------------------------------------------------
  publish-fitsview:
    needs: [fitsview-isolated, fitsview-integration]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: fitsview-dist
          path: dist
      - run: ls -R dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-pyviewarr:
    needs: [pyviewarr]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pyviewarr-dist
          path: dist
      - run: ls -R dist
      - uses: pypa/gh-action-pypi-publish@release/v1
